llm:
  name: "gemini-2.5-pro"
  client_type: "gemini"
  context_size: 120000
  max_output_tokens: 8192
  temperature: 1.0
  top_p: 0.95
  safety_margin: 600
  max_try_count: 5

advisor_llm:
  name: "gemini-2.5-pro"

implementer_llm:
  name: "gemini-2.5-pro"

rl:
  objective: "pacevolve++"
  backend: "mock"
  n_samples: 4
  top_k: 2
  total_steps: 2
  eps_num: 1.0e-8
  eps_skip: 1.0e-6
  entropic_gamma: 1.0
  clip_eps_lo: 0.2
  clip_eps_hi: 0.28
  reward:
    scale_c: 5.0
    alpha_r: 1.0

experiment:
  max_iters: 1000
  task_id: "eplb"
  max_hparam_iters: 0
  sota_algo_name: "EPLB"
  initial_baseline_id: -1
  num_cpu_cores: 32

paths:
  data_path: "~/auto_evo/tasks/eplb/data"
  src_path: "~/auto_evo/tasks/eplb/src"
  eval_path: "~/auto_evo/tasks/eplb/eval"
  results_path: "~/auto_evo/tasks/eplb/results"
  target_file_path: "eplb_1.py"
  log_dir: "~/auto_evo/tasks/eplb/verbose"
  transcript_dir: "~/auto_evo/tasks/eplb/transcripts"

compilation:
  python_bin: "python3"
  recompile_timeout: 100
  recompile_max_retries: 2
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  metric_direction: "max"
  init_score: 0.8368
  target_score: 1.0
  num_experts: 128
  num_devices: 8
  num_profiles: 5
  seed: 0
  ref_time: 1.0
  eval_timeout: 1800
  eval_max_retries: 1
  eval_script_name: "eval_eplb.py"
  max_parallel_evals: 5
  eval_configs:
    - dataset: "synthetic"

database:
  num_islands: 1
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
