# Configuration for the KNN experiment workflow.

llm:
  name: "gemini-2.5-pro"
  context_size: 120000
  safety_margin: 600
  max_try_count: 5

experiment:
  max_iters: 1000
  task_id: "kernel_bench"
  max_hparam_iters: 0
  sota_algo_name: "BMM_NORM" # From prompts.py
  initial_baseline_id: -1
  num_cpu_cores: 32

paths:
  # Using ~ for home directory is supported.
  data_path: "~/auto_evo/tasks/kernel_bench/data"
  src_path: "~/auto_evo/tasks/kernel_bench/src"
  eval_path: "~/auto_evo/tasks/kernel_bench/eval"
  results_path: "~/auto_evo/tasks/kernel_bench/results"
  target_file_path: "kernels/BMM_InstanceNorm_Sum_ResidualAdd_Multiply/kernel.py"
  # pip_path: "python-bindings"
  # Log and transcript directories will be created if they don't exist.
  log_dir: "~/auto_evo/tasks/kernel_bench/verbose"
  transcript_dir: "~/auto_evo/tasks/kernel_bench/transcripts"
  

compilation:
  conda_env: "kernel-bench"
  recompile_timeout: 600
  recompile_max_retries: 2
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 1800
  eval_max_retries: 1
  eval_script_name: "eval_auto_evo.py"
  kernel_name: "BMM_InstanceNorm_Sum_ResidualAdd_Multiply"
  baseline_time: 0.265
  target_score: 2.5
  init_score: 1
  baseline_diff_metric: "mean_variance"
  metric_direction: "max"
  max_parallel_evals: 5
  eval_configs:
    - dataset: "fineweb"

database:
  num_islands: 1
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  # From edit_until_compile in workflow_utils.py
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  # From edit_until_successful_eval in workflow_utils.py
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"
  # From edit_until_compile for hparams
  hparam_compile:
    max_attempts: 3
    loop_tag: "hparam_compile_loop"
    summary_tag: "hparam_compile_loop"
  # From edit_until_successful_eval for hparams
  hparam_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "hparam_eval_loop"
    summary_tag: "hparam_eval_summary"
    compile_loop_tag: "hparam_compile_loop"
    compile_summary_tag: "hparam_compile_loop"

summarization:
  # From _summarize_compile_error in workflow_utils.py
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
