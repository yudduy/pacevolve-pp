# Configuration for the KNN experiment workflow.

llm:
  name: "gemini-2.5-pro"
  client_type: "gemini"
  context_size: 120000
  safety_margin: 600
  max_try_count: 5

experiment:
  max_iters: 1000
  task_id: "llmsr"
  max_hparam_iters: 0
  sota_algo_name: "LLMSR" # From prompts.py
  initial_baseline_id: -1
  num_cpu_cores: 32

paths:
  # Using ~ for home directory is supported.
  data_path: "~/auto_evo/tasks/llmsr/data"
  src_path: "~/auto_evo/tasks/llmsr/src"
  eval_path: "~/auto_evo/tasks/llmsr/eval"
  results_path: "~/auto_evo/tasks/llmsr/results"
  target_file_path: "llmsr_1.py"
  # pip_path: "python-bindings"
  # Log and transcript directories will be created if they don't exist.
  log_dir: "~/auto_evo/tasks/llmsr/verbose"
  transcript_dir: "~/auto_evo/tasks/llmsr/transcripts"

compilation:
  conda_env: "llmsrbench"
  recompile_timeout: 100
  recompile_max_retries: 2
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 1800
  eval_max_retries: 1
  eval_script_name: "evaluate_llmsr.py"
  baseline_diff_metric: "mean_variance"
  max_parallel_evals: 5
  problem_idx: 0
  target_score: -10
  init_score: -2
  metric_direction: "min"
  eval_configs:
    - dataset: "simulation"
      dim: 8

database:
  num_islands: 1
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  # From edit_until_compile in workflow_utils.py
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  # From edit_until_successful_eval in workflow_utils.py
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  # From _summarize_compile_error in workflow_utils.py
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
