# Test-only fake task config. Paths are placeholders; tests override paths
# (src/target/log/transcript/results) to a temp dir for mutation safety.

llm:
  name: "fake-model"
  context_size: 8000
  max_output_tokens: 1024
  temperature: 1.0
  top_p: 0.95
  max_try_count: 2

# Optional advisor/implementer split (PACEvolve++). Fall back to `llm` if absent.
advisor_llm:
  name: "fake-advisor"
implementer_llm:
  name: "fake-implementer"

rl:
  objective: "pacevolve++"
  backend: "mock"
  n_samples: 4
  top_k: 2
  total_steps: 2
  eps_num: 1.0e-8
  eps_skip: 1.0e-6
  entropic_gamma: 1.0
  clip_eps_lo: 0.2
  clip_eps_hi: 0.28
  reward:
    scale_c: 5.0
    alpha_r: 1.0

experiment:
  max_iters: 2
  task_id: "fake_task"
  max_hparam_iters: 0
  sota_algo_name: "FAKE_SOTA"
  initial_baseline_id: -1
  num_cpu_cores: 4

paths:
  data_path: "tests/fixtures/tasks/fake_task/data"
  src_path: "tests/fixtures/tasks/fake_task/src"
  eval_path: "tests/fixtures/tasks/fake_task/eval"
  results_path: "tests/fixtures/tasks/fake_task/_runtime/results"
  target_file_path: "fake_1.py"
  log_dir: "tests/fixtures/tasks/fake_task/_runtime/verbose"
  transcript_dir: "tests/fixtures/tasks/fake_task/_runtime/transcripts"

compilation:
  conda_env: "fake"
  recompile_timeout: 30
  recompile_max_retries: 1
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 30
  eval_max_retries: 1
  eval_script_name: "eval_fake.py"
  target_score: 5
  init_score: 1
  metric_direction: "max"
  max_parallel_evals: 2
  eval_configs:
    - dataset: "synthetic"

database:
  num_islands: 4
  tournament_size: 2
  top_k: 2
  max_queue_size: 50

workflow_loops:
  initial_compile:
    max_attempts: 2
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 2
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
